AWSTemplateFormatVersion: "2010-09-09"
Description: fair-select.kotahirau.com — S3 + CloudFront + Route53

Parameters:
  CertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:329351092147:certificate/11a20372-3856-4d45-b367-96086aecccfa
    Description: ACM certificate ARN (must be in us-east-1)
  HostedZoneId:
    Type: String
    Default: Z00967492U5F263AVXBAW
  DomainName:
    Type: String
    Default: fair-select.kotahirau.com

Resources:
  # ── S3 bucket (private, only CloudFront can read) ──────────────────────────
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: fair-select-kotahirau-com
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── CloudFront Origin Access Control ──────────────────────────────────────
  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: fair-select-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── S3 bucket policy — allow only CloudFront OAC ──────────────────────────
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${S3Bucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ── CloudFront distribution ────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Ref DomainName
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_All
        Aliases:
          - !Ref DomainName
        Origins:
          - Id: s3-origin
            DomainName: !Sub ${S3Bucket}.s3.${AWS::Region}.amazonaws.com
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref OAC
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        # Serve index.html for all 403/404 so React SPA routes work
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # ── Route53 ALIAS record ───────────────────────────────────────────────────
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone (always this value)
        EvaluateTargetHealth: false

Outputs:
  BucketName:
    Value: !Ref S3Bucket
    Export:
      Name: fair-select-bucket-name
  DistributionId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: fair-select-distribution-id
  DistributionDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
  SiteUrl:
    Value: !Sub https://${DomainName}
